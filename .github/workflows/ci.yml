# ==============================================================================
# CI Pipeline — Build, type-check, audit
# ==============================================================================
# Triggers: Push to main, all PRs
# Purpose: Fast feedback on build, types, and dependency security
# ==============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION_DEFAULT: '20'

jobs:
  # ============================================================================
  # TypeScript Build & Type Check (matrix)
  # ============================================================================
  build:
    name: Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify dist outputs exist
        run: |
          test -f dist/index.js || (echo "❌ dist/index.js missing" && exit 1)
          test -f dist/setup.js || (echo "❌ dist/setup.js missing" && exit 1)
          echo "✅ dist/index.js and dist/setup.js present"

      - name: Verify shebang lines
        run: |
          head -1 dist/index.js | grep -q "#!/usr/bin/env node" || (echo "❌ Missing shebang in index.js" && exit 1)
          head -1 dist/setup.js | grep -q "#!/usr/bin/env node" || (echo "❌ Missing shebang in setup.js" && exit 1)
          echo "✅ Shebang lines OK"

      - name: Verify executable permissions
        run: |
          test -x dist/index.js || (echo "❌ dist/index.js not executable" && exit 1)
          test -x dist/setup.js || (echo "❌ dist/setup.js not executable" && exit 1)
          echo "✅ Executable permissions OK"

  # ============================================================================
  # Security Audit
  # ============================================================================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high

  # ============================================================================
  # Package Dry-run — verify npm pack contents
  # ============================================================================
  pack-check:
    name: Package Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION_DEFAULT }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Pack dry-run
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          echo ""
          echo "── Packed files ──"
          cat pack-output.txt

      - name: Verify essential files in package
        run: |
          npm pack --dry-run 2>&1 | grep -q "dist/index.js" || (echo "❌ dist/index.js not in package" && exit 1)
          npm pack --dry-run 2>&1 | grep -q "dist/setup.js" || (echo "❌ dist/setup.js not in package" && exit 1)
          npm pack --dry-run 2>&1 | grep -q "scripts/postinstall.js" || (echo "❌ scripts/postinstall.js not in package" && exit 1)
          npm pack --dry-run 2>&1 | grep -q "README.md" || (echo "❌ README.md not in package" && exit 1)
          echo "✅ All essential files present in package"
